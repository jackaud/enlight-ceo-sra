services:
  - type: web
    name: enlight-ceo-sra-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODE
        value: mock
      - key: CORS_ORIGINS
        value: https://enlightin-poc.vercel.app,http://localhost:7100
      - key: PYTHON_VERSION
        value: 3.12.8
